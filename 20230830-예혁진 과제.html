<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과제</title>
    <style>        
        .intro-title {
            font-size: 36px;       
            text-align: center;    
        }
        
        .bold-text {
            font-weight: bold;     
        }

        input[type="text"] {
            background-color: pink; 
            padding: 5px;
            margin-bottom: 10px;
        }

        input[type="password"] {
            background-color: lightblue; 
            padding: 5px;
        }

        .btn-box {
            width: 120px;                
            height: 50px;                 
            background-color: orange;     
            text-align: center;           
            line-height: 50px;            
            border-radius: 10px;          
            margin-top: 20px;
        }
   
        .btn-box a {
            color: white;                
            text-decoration: none;       
            display: block;               
        }
    </style>
</head>
<body>

    <h1 class="intro-title">안녕하세요</h1>
    <p>저는 예혁진입니다.</p>
    <p><span class="bold-text">학교 열심히 다니겠습니다</span> 감사합니다</p>
    
    <hr>

    <h2>로그인 정보 입력</h2>
    <form>
        <label for="username">아이디 : </label>
        <input type="text" id="username" placeholder="아이디 입력"><br>
        
        <label for="userpw">비밀번호 : </label>
        <input type="password" id="userpw" placeholder="비밀번호 입력">
    </form>

    <hr>

    <h2>이동하기</h2>
    <div class="btn-box">
        <a href="#">Click</a>
    </div>

</body>
</html>
